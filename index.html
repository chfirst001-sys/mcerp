<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA 관련 태그 -->
    <meta name="theme-color" content="#2c3e50">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <!-- 캐시 방지 메타 태그 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>MC지기 - 건물 관리</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 구글 머티리얼 아이콘 폰트 추가 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <h2>MC지기 로그인</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="이메일" required>
                <input type="password" id="loginPassword" placeholder="비밀번호" required>
                <button type="submit">로그인</button>
            </form>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- 앱 메인 화면 (로그인 전에는 숨김) -->
    <div id="app-wrapper" class="hidden">
    <!-- 사이드바 영역 -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>MC지기 메뉴</h2>
            <button id="sidebarClose" class="close-btn"><span class="material-symbols-outlined">close</span></button>
        </div>
        <ul class="sidebar-menu">
            <li data-module="building_select"><span class="material-symbols-outlined">domain</span> 건물선택</li>
            <li data-module="building_register"><span class="material-symbols-outlined">add_business</span> 건물등록</li>
            <li data-module="member_manage"><span class="material-symbols-outlined">manage_accounts</span> 회원관리</li>
            <li data-module="db_manage"><span class="material-symbols-outlined">database</span> DB관리</li>
            <li id="sidebarInstallBtn" class="hidden"><span class="material-symbols-outlined">install_mobile</span> 앱 설치 (홈 화면 추가)</li>
        </ul>
    </aside>
    <!-- 사이드바 활성화 시 배경 어둡게 -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- 상단 네비게이션 바 -->
    <header class="top-bar">
        <div class="top-bar-left">
            <button id="sidebarToggle" class="menu-btn">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
        <div class="top-bar-center">
            <span id="currentBuildingName">전체 건물</span>
        </div>
        <div class="top-bar-right">
            <button id="installAppBtn" class="menu-btn hidden" style="margin-right: 10px;" title="앱 설치(홈 화면에 추가)">
                <span class="material-symbols-outlined">download</span>
            </button>
            <button class="account-btn">
                <span class="material-symbols-outlined">account_circle</span>
            </button>
        </div>
    </header>

    <!-- 메인 컨텐츠 영역 (모듈이 화면에 그려지는 곳) -->
    <main id="app-content">
        <div style="text-align: center; padding: 50px;">모듈을 불러오는 중...</div>
    </main>

    <!-- 하단 탭 바 -->
    <nav class="bottom-bar">
        <div class="tab-item active" data-module="dashboard">
            <span class="tab-icon material-symbols-outlined">dashboard</span>
            <span class="tab-label">대시보드</span>
        </div>
        <div class="tab-item" data-module="facility">
            <span class="tab-icon material-symbols-outlined">handyman</span>
            <span class="tab-label">시설관리</span>
        </div>
        <div class="tab-item" data-module="accounting">
            <span class="tab-icon material-symbols-outlined">payments</span>
            <span class="tab-label">회계관리</span>
        </div>
        <div class="tab-item" data-module="tenant">
            <span class="tab-icon material-symbols-outlined">group</span>
            <span class="tab-label">입주민관리</span>
        </div>
        <div class="tab-item" data-module="schedule">
            <span class="tab-icon material-symbols-outlined">calendar_month</span>
            <span class="tab-label">스케줄</span>
        </div>
        <div class="tab-item" data-module="document">
            <span class="tab-icon material-symbols-outlined">folder</span>
            <span class="tab-label">문서</span>
        </div>
    </nav>
    </div>

    <!-- 코드를 크게 업데이트할 때마다 v= 뒤의 버전 숫자를 올려주세요 -->
    <script type="module" src="js/main.js?v=20240408"></script>
</body>
</html>
